name: CI/CD Pipeline

on:
  workflow_dispatch:
  # push:
  #   branches: [ "main", "dev" ]
  # pull_request:
  #   branches: [ "main", "dev" ]

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (Web)
        run: pnpm -C apps/web lint

      - name: Typecheck (All)
        run: pnpm typecheck

      - name: Build (All)
        run: pnpm build

  deploy-dev:
    name: Deploy to Dev
    needs: build-and-test
    if: github.ref == 'refs/heads/dev' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: development
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy logic placeholder
        run: echo "Place here your deployment scripts for DEV environment"

  deploy-prod:
    name: Deploy to Production
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy logic placeholder
        run: echo "Place here your deployment scripts for PRODUCTION environment"
